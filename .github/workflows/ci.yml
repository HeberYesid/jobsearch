name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python tools/lint_skills.py

  security-guards:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python tools/security_guards.py

  latex-smoke:
    runs-on: ubuntu-24.04
    container:
      image: texlive/texlive:latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compile CV template
        run: |
          cd cv
          lualatex -interaction=nonstopmode main_example.tex 2>&1 || true
          if grep -n '^!' main_example.log; then
            echo "::error::LaTeX errors in cv/main_example.tex"
            exit 1
          fi
          echo "CV compiled successfully"
      - name: Compile cover letter template
        run: |
          cd cover_letters
          xelatex -interaction=nonstopmode cover_example.tex 2>&1 || true
          if grep -n '^!' cover_example.log; then
            echo "::error::LaTeX errors in cover_letters/cover_example.tex"
            exit 1
          fi
          echo "Cover letter compiled successfully"

  cli-typecheck:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cli:
          - linkedin-search
          - freehire-search
    defaults:
      run:
        working-directory: .opencode/skills/${{ matrix.cli }}/cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck

  placeholder-integrity:
    if: github.repository == 'HeberYesid/jobsearch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check CV template placeholders
        run: |
          for token in FIRSTNAME FAMILYNAME JOB_TITLE STREET_ADDRESS PHONE_NUMBER EMAIL_ADDRESS LINKEDIN_HANDLE GITHUB_HANDLE PORTFOLIO_URL PROFILE_SUMMARY_TITLE PROFILE_SUMMARY_TEXT EXPERIENCE_TITLE EDUCATION_TITLE SKILLS_TITLE LANGUAGES_TITLE CERTIFICATIONS_TITLE; do
            if ! grep -q "\[$token\]" cv/main_example.tex; then
              echo "::error::Missing placeholder [$token] in cv/main_example.tex"
              exit 1
            fi
          done
          echo "CV template placeholders intact"
      - name: Check cover letter template placeholders
        run: |
          for token in GREETING OPENING_PARAGRAPH CLOSING_PARAGRAPH CLOSING; do
            if ! grep -q "\[$token\]" cover_letters/cover_example.tex; then
              echo "::error::Missing placeholder [$token] in cover_letters/cover_example.tex"
              exit 1
            fi
          done
          echo "Cover letter template placeholders intact"
      - name: Check cover class placeholders
        run: |
          for token in YOUR_NAME YOUR_ADDRESS YOUR_PHONE YOUR_EMAIL YOUR_LINK RECIPIENT_NAME COMPANY_NAME COMPANY_ADDRESS JOB_TITLE; do
            if ! grep -q "\[$token\]" cover_letters/cover.cls; then
              echo "::error::Missing placeholder [$token] in cover_letters/cover.cls"
              exit 1
            fi
          done
          echo "Cover class placeholders intact"
