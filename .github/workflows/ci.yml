# CI for the framework: LaTeX smoke compiles, skill/command lint,
# CLI typechecks, and (upstream only) placeholder integrity.
#
# Fork-friendly: forks personalize profile/ and templates via /setup,
# so the placeholder-integrity job runs only on the upstream template repo.
# Compile success and lint correctness are asserted everywhere.
#
# Deliberately NOT here: live smoke tests of the job-portal CLIs. They hit
# real portals (network-flaky, and the linkedin-search skill is personal-use
# only per its own ToS warning - CI-automated requests would violate that).
# CLIs get typechecked instead; live testing stays a local, on-demand step.
#
# Security posture: this template ships pre-approved OpenCode permissions
# and CLI code that every fork user executes, so the security-guards job
# fails PRs that widen opencode.json permissions, weaken the personal-data
# gitignore rules, or add package lifecycle scripts. Honest limit: a PR can
# edit this workflow itself, so these guards catch accidents and casual
# attempts, not a determined author - branch protection with required checks
# and human review of workflow/config diffs remain the real backstop.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint skills, commands, config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python tools/lint_skills.py

  security-guards:
    name: Security guards (permissions, gitignore, manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/security_guards.py

  latex-smoke:
    name: Compile example CV and cover letter
    runs-on: ubuntu-latest
    container: texlive/texlive:latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile CV example (lualatex)
        run: |
          cd cv
          lualatex -interaction=nonstopmode main_example.tex
          test -f main_example.pdf
          if grep -q '^!' main_example.log; then
            echo '::error::lualatex reported errors compiling cv/main_example.tex'
            grep -A3 '^!' main_example.log
            exit 1
          fi
      - name: Compile cover letter example (xelatex)
        run: |
          cd cover_letters
          xelatex -interaction=nonstopmode cover_example.tex
          test -f cover_example.pdf
          if grep -q '^!' cover_example.log; then
            echo '::error::xelatex reported errors compiling cover_letters/cover_example.tex'
            grep -A3 '^!' cover_example.log
            exit 1
          fi

  cli-typecheck:
    name: Typecheck ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool:
          - linkedin-search
          - freehire-search
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: .opencode/skills/${{ matrix.tool }}/cli
      - run: bun run typecheck
        working-directory: .opencode/skills/${{ matrix.tool }}/cli

  placeholder-integrity:
    name: Placeholder integrity (upstream only)
    if: github.repository == 'HeberYesid/jobsearch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tracked template files must keep their placeholder tokens
        run: |
          fail=0
          check() {
            if ! grep -q "$2" "$1"; then
              echo "::error file=$1::expected placeholder token $2 - personal data may have been committed"
              fail=1
            fi
          }
          check cv/main_example.tex '\[FIRSTNAME\]'
          check cv/main_example.tex '\[JOB_TITLE\]'
          check cover_letters/cover_example.tex '\[GREETING\]'
          check cover_letters/cover_example.tex '\[OPENING_PARAGRAPH\]'
          check cover_letters/cover.cls '\[YOUR_NAME\]'
          check .opencode/skills/job-application-assistant/01-candidate-profile.md '\[PLACEHOLDER'
          check .opencode/skills/job-application-assistant/04-job-evaluation.md '\[PLACEHOLDER'
          exit $fail
